version: '3.9'

services:

  api:
    build: .
    container_name: landed_cost_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    container_name: landed_cost_db

    restart: always

    environment:
      POSTGRES_DB: rrmstock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: